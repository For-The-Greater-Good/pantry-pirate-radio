name: ppr-beacon
version: 0.1.0
description: SEO-optimized static mini-sites for verified food pantry locations

env_vars:
  - name: DATABASE_HOST
    required: false
    description: Database hostname (default localhost)
  - name: DATABASE_PORT
    required: false
    description: Database port (default 5432)
  - name: DATABASE_USER
    required: false
    description: Database username
  - name: DATABASE_PASSWORD
    required: false
    description: Database password
  - name: DATABASE_NAME
    required: false
    description: Database name
  - name: DATABASE_SECRET_ARN
    required: false
    description: Secrets Manager ARN for DB credentials (AWS only)
  - name: DATABASE_PROXY_ENDPOINT
    required: false
    description: RDS Proxy endpoint (AWS only)
  - name: BEACON_BASE_URL
    default: "https://plentiful.org/providers"
    description: Base URL for canonical URLs and sitemaps
  - name: BEACON_OUTPUT_DIR
    default: "./output"
    description: Local output directory for generated files
  - name: BEACON_S3_BUCKET
    required: false
    description: S3 bucket for deployment (AWS only)
  - name: BEACON_CLOUDFRONT_DIST_ID
    required: false
    description: CloudFront distribution ID for cache invalidation
  - name: BEACON_ANALYTICS_ENDPOINT
    required: false
    description: Analytics event collection endpoint

docker:
  compose: .docker/compose.yml

depends_on:
  - ppr-write-api

cdk_stacks:
  - module: beacon_stack
    class: BeaconStack

commands:
  - build
  - serve
  - status
