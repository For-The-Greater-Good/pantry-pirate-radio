<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ page_title }}</title>
  <meta name="description" content="{{ page_description }}">
  <link rel="canonical" href="{{ canonical_url }}">

  <!-- Open Graph -->
  <meta property="og:title" content="{{ page_title }}">
  <meta property="og:description" content="{{ page_description }}">
  <meta property="og:url" content="{{ canonical_url }}">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Plentiful">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{{ page_title }}">
  <meta name="twitter:description" content="{{ page_description }}">

  <link rel="stylesheet" href="{{ base_url }}/static/css/beacon.css">
  {% if analytics_endpoint %}
  <meta name="beacon-analytics" content="{{ analytics_endpoint }}">
  {% endif %}
  {% block head_extra %}{% endblock %}
</head>
<body>
  <div class="page-wrapper">
    {% include "partials/header.html" %}

    <main>
      <div class="container">
        {% block content %}{% endblock %}
      </div>
    </main>

    {% include "partials/footer.html" %}
  </div>

  {% if analytics_endpoint %}
  <script src="{{ base_url }}/static/js/beacon-analytics.js" defer></script>
  {% endif %}
</body>
</html>
