services:
  beacon:
    build:
      context: ../../plugins/ppr-beacon
      dockerfile: .docker/Dockerfile
    env_file: ../../.env
    environment:
      - DATABASE_HOST=db
      - DATABASE_PORT=5432
      - DATABASE_USER=postgres
      - DATABASE_PASSWORD=${DATABASE_PASSWORD:-pirate}
      - DATABASE_NAME=${DATABASE_NAME:-pantry_pirate_radio}
      - BEACON_BASE_URL=${BEACON_BASE_URL:-http://localhost:8888}
      - BEACON_OUTPUT_DIR=/app/output
    volumes:
      - ../../plugins/ppr-beacon/app:/app/app
      - ../../plugins/ppr-beacon/templates:/app/templates
      - ../../plugins/ppr-beacon/static:/app/static
      - beacon-output:/app/output
    depends_on:
      db:
        condition: service_started
    networks:
      - default
    profiles:
      - beacon

volumes:
  beacon-output:

networks:
  default:
    name: pantry-pirate-radio_default
    external: true
