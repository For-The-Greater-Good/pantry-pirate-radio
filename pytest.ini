[pytest]
asyncio_mode = auto
testpaths = tests
python_files = test_*.py
norecursedirs = docs/* .* build dist CVS _darcs {arch} *.egg venv env virtualenv
addopts =
    --strict-markers
    --tb=short
    -v
markers =
    asyncio: mark test as async/await test
    integration: mark test as integration test
    e2e: mark test as end-to-end test with live services
    interop_pending: a federation wire-format reading pinned BY FIAT (no cross-impl anchor yet); re-validate at P2 against the reference second node / live FA feed. `pytest -m interop_pending --co -q` lists the checklist. See tests/test_federation/vendor/INTEROP_PENDING.md
