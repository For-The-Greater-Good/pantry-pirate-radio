# Shared Pipeline Configuration
# Single source of truth for values that must be identical across
# local Docker (./bouy up) and AWS deployments.
#
# Consumed by:
#   - app/core/config.py (app runtime defaults)
#   - infra/shared_config.py (CDK stack environment variables)
#
# Environment variables ALWAYS override these defaults.
# Sensitive values MUST NOT go here — use .env or AWS SM.

llm:
  temperature: 0.7
  max_tokens: 16384
  timeout: 30
  retries: 3

validation:
  enabled: true
  rejection_threshold: 10

enrichment:
  enabled: true
  cache_ttl: 86400
  timeout: 30
  geocoding_providers:
    - amazon-location
    - arcgis
    - nominatim
    - census

geocoding:
  provider: arcgis
  enable_fallback: true
  max_retries: 3
  timeout: 10

content_store:
  enabled: true

reconciler:
  location_tolerance: 0.0001

submarine:
  enabled: false
  crawl_timeout: 30
  max_pages_per_site: 3
  min_crawl_delay: 5
  max_attempts: 3
  cooldown_success_days: 30
  cooldown_no_data_days: 90
  cooldown_error_days: 14
